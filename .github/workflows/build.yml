name: Build TipidTracker APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android Platform Files
        run: |
          flutter create . --platforms android
          rm -rf test

      - name: Install Dependencies
        run: flutter pub get

      - name: Modify Android Configuration
        run: |
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle || true
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts || true
          perl -pi -e 's/<\/application>/    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>\n<\/application>/g' android/app/src/main/AndroidManifest.xml || true
          python3 -c '
          import os, re
          kts = "android/app/build.gradle.kts"
          gvy = "android/app/build.gradle"
          root_gvy = "android/build.gradle"
          
          # Patch Root build.gradle (Kotlin version)
          if os.path.exists(root_gvy):
              with open(root_gvy, "r") as f: c = f.read()
              # Update kotlin_version to 1.9.0
              c = re.sub(r"ext\.kotlin_version\s*=\s*['\"].*?['\"]", "ext.kotlin_version = \"1.9.10\"", c)
              # Also update classpath for gradle if too old
              c = re.sub(r"com\.android\.tools\.build:gradle:.*", "com.android.tools.build:gradle:7.3.0", c)
              with open(root_gvy, "w") as f: f.write(c)
              print("Root build.gradle patched")

          # Patch Gradle wrapper
          wrapper = "android/gradle/wrapper/gradle-wrapper.properties"
          if os.path.exists(wrapper):
              with open(wrapper, "r") as f: c = f.read()
              c = re.sub(r"distributionUrl=.*", "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.3-all.zip", c)
              with open(wrapper, "w") as f: f.write(c)
              print("Gradle wrapper patched")

          # Patch App build.gradle (MinSDK, MultiDex, Desugaring)
          if os.path.exists(kts):
              with open(kts, "r") as f: c = f.read()
              # Force compileSdkVersion to 34
              c = re.sub(r"compileSdkVersion\s+.*", "compileSdkVersion = 34", c)
              if "multiDexEnabled" not in c:
                  c = c.replace("defaultConfig {", "defaultConfig {\n        multiDexEnabled = true")
                  c = c.replace("compileOptions {", "compileOptions {\n        isCoreLibraryDesugaringEnabled = true")
                  with open(kts, "w") as f: 
                      f.write(c)
                      f.write("\ndependencies {\n    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.0.4\")\n}\n")
                  print("Patched kts desugaring")
          elif os.path.exists(gvy):
              with open(gvy, "r") as f: c = f.read()
              # Force compileSdkVersion to 34
              c = re.sub(r"compileSdkVersion\s+.*", "compileSdkVersion 34", c)
              if "multiDexEnabled" not in c:
                  c = c.replace("defaultConfig {", "defaultConfig {\n        multiDexEnabled true")
                  c = c.replace("compileOptions {", "compileOptions {\n        coreLibraryDesugaringEnabled true")
                  with open(gvy, "w") as f: 
                      f.write(c)
                      f.write("\ndependencies {\n    coreLibraryDesugaring \"com.android.tools:desugar_jdk_libs:2.0.4\"\n}\n")
                  print("Patched gvy desugaring")
          '
      - name: Analyze Dart Code
        run: |
          flutter analyze > analyze.txt 2>&1 || true
          cat analyze.txt
          tail -n 30 analyze.txt | while read -r line; do echo "::warning::ANALYZE: $line"; done

      - name: Build APK
        run: |
          if ! flutter build apk --release > build.txt 2>&1; then
            cat build.txt
            echo "::error::=== TASK FAILURE ==="
            grep -A 60 -i "Execution failed for task" build.txt | head -n 60 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== EXCEPTIONS ==="
            grep -A 30 -i "Exception:" build.txt | head -n 30 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== WHAT WENT WRONG ==="
            grep -A 30 "What went wrong:" build.txt | head -n 50 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TipidTracker-APK
          path: build/app/outputs/flutter-apk/app-release.apk
