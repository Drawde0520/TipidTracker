name: Build TipidTracker APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android Platform Files
        run: |
          flutter create . --platforms android
          rm -rf test

      - name: Install Dependencies
        run: flutter pub get

      - name: Modify Android Configuration
        run: |
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle || true
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts || true
          perl -pi -e 's/<\/application>/    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>\n<\/application>/g' android/app/src/main/AndroidManifest.xml || true
          python3 << 'EOF'
          import os, re
          
          def patch_file(path, regex, replacement):
              if os.path.exists(path):
                  with open(path, "r") as f: content = f.read()
                  new_content = re.sub(regex, replacement, content)
                  if new_content != content:
                      with open(path, "w") as f: f.write(new_content)
                      print(f"✅ Patched {path}")
                  else:
                      print(f"ℹ️ No change needed for {path} (Regex might not have matched)")

          # 1. Patch Root build.gradle (.gradle or .kts)
          root_gradle = "android/build.gradle"
          root_kts = "android/build.gradle.kts"
          for p in [root_gradle, root_kts]:
              patch_file(p, r"ext\.kotlin_version\s*=\s*['\"].*?['\"]", "ext.kotlin_version = '1.9.22'")
              patch_file(p, r"com\.android\.tools\.build:gradle:[^'\"]*", "com.android.tools.build:gradle:8.0.2")
              # Also handle the plugins block syntax
              patch_file(p, r'id\("org\.jetbrains\.kotlin\.android"\) version "[^"]*"', 'id("org.jetbrains.kotlin.android") version "1.9.22"')
          
          # 2. Patch Gradle Wrapper
          wrapper = "android/gradle/wrapper/gradle-wrapper.properties"
          patch_file(wrapper, r"distributionUrl=.*", "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-all.zip")

          # 3. Patch App build.gradle
          app_gradle = "android/app/build.gradle"
          app_kts = "android/app/build.gradle.kts"
          for p in [app_gradle, app_kts]:
              # Enforce SDK versions
              if p.endswith(".kts"):
                  patch_file(p, r"compileSdkVersion\s*=\s*\d+", "compileSdkVersion = 34")
                  patch_file(p, r"targetSdkVersion\s*=\s*\d+", "targetSdkVersion = 34")
                  patch_file(p, r"minSdkVersion\s*=\s*\d+", "minSdkVersion = 21")
              else:
                  patch_file(p, r"compileSdkVersion\s+\d+", "compileSdkVersion 34")
                  patch_file(p, r"targetSdkVersion\s+\d+", "targetSdkVersion 34")
                  patch_file(p, r"minSdkVersion\s+\d+", "minSdkVersion 21")
              
              # Enable MultiDex and Desugaring
              with open(p, "r") as f: c = f.read()
              if "multiDexEnabled" not in c:
                  if p.endswith(".kts"):
                      c = c.replace("defaultConfig {", "defaultConfig {\n        multiDexEnabled = true")
                      c = c.replace("compileOptions {", "compileOptions {\n        isCoreLibraryDesugaringEnabled = true")
                      c += "\ndependencies {\n    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.0.4\")\n}\n"
                  else:
                      c = c.replace("defaultConfig {", "defaultConfig {\n        multiDexEnabled true")
                      c = c.replace("compileOptions {", "compileOptions {\n        coreLibraryDesugaringEnabled true")
                      c += "\ndependencies {\n    coreLibraryDesugaring \"com.android.tools:desugar_jdk_libs:2.0.4\"\n}\n"
                  with open(p, "w") as f: f.write(c)
                  print(f"🚀 Enabled MultiDex & Desugaring in {p}")
          EOF

      - name: Analyze Dart Code
        run: |
          flutter analyze > analyze.txt 2>&1 || true
          cat analyze.txt
          tail -n 30 analyze.txt | while read -r line; do echo "::warning::ANALYZE: $line"; done

      - name: Build APK
        run: |
          if ! flutter build apk --release > build.txt 2>&1; then
            cat build.txt
            echo "::error::=== TASK FAILURE ==="
            grep -A 60 -i "Execution failed for task" build.txt | head -n 60 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== EXCEPTIONS ==="
            grep -A 30 -i "Exception:" build.txt | head -n 30 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== WHAT WENT WRONG ==="
            grep -A 30 "What went wrong:" build.txt | head -n 50 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TipidTracker-APK
          path: build/app/outputs/flutter-apk/app-release.apk
