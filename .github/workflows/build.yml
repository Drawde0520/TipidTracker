name: Build TipidTracker APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android Platform Files
        run: |
          flutter create . --platforms android
          rm -rf test

      - name: Install Dependencies
        run: flutter pub get

      - name: Modify Android Configuration
        run: |
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle || true
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts || true
          perl -pi -e 's/<\/application>/    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>\n<\/application>/g' android/app/src/main/AndroidManifest.xml || true

      - name: Analyze Dart Code
        run: |
          flutter analyze > analyze.txt 2>&1 || true
          cat analyze.txt
          tail -n 30 analyze.txt | while read -r line; do echo "::warning::ANALYZE: $line"; done

      - name: Build APK
        run: |
          if ! flutter build apk --release > build.txt 2>&1; then
            cat build.txt
            echo "::error::=== TASK FAILURE ==="
            grep -A 60 -i "Execution failed for task" build.txt | head -n 60 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== EXCEPTIONS ==="
            grep -A 30 -i "Exception:" build.txt | head -n 30 | while read -r line; do echo "::error::$line"; done
            echo "::error::=== WHAT WENT WRONG ==="
            grep -A 30 "What went wrong:" build.txt | head -n 50 | while read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TipidTracker-APK
          path: build/app/outputs/flutter-apk/app-release.apk
