name: tipid_tracker
description: "A financial tracking app for daily expenses and debt management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cloud_firestore: ^4.15.8
  firebase_core: ^2.26.0
  fl_chart: ^0.66.0
  flutter_local_notifications: ^17.1.0
  google_mobile_ads: ^4.0.0
  share_plus: ^8.0.0
  connectivity_plus: ^5.0.2
  provider: ^6.1.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
